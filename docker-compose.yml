x-app-env: &app-env
  RECON_ENV: docker
  RECON_LOG_LEVEL: INFO
  # Inside the compose network, reach the stores by service name (not localhost).
  RECON_DATABASE_URL: postgresql+psycopg2://recon_app:recon_app@postgres:5432/recon
  RECON_DATABASE_ADMIN_URL: postgresql+psycopg2://recon:recon@postgres:5432/recon
  RECON_REDIS_URL: redis://redis:6379/0
  RECON_S3_ENDPOINT_URL: http://minio:9000
  RECON_S3_ACCESS_KEY: recon
  RECON_S3_SECRET_KEY: recon-secret
  RECON_S3_BUCKET: recon-artifacts

x-app-base: &app-base
  build:
    context: .
  image: recon-platform:local
  environment: *app-env

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: recon
      POSTGRES_PASSWORD: recon
      POSTGRES_DB: recon
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recon"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: recon
      MINIO_ROOT_PASSWORD: recon-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - miniodata:/data

  # One-shot: apply migrations (schema + RLS + app role), then exit.
  migrate:
    <<: *app-base
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    <<: *app-base
    command: ["uvicorn", "recon.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"
      interval: 5s
      timeout: 4s
      retries: 12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    <<: *app-base
    command: ["python", "-m", "recon.worker.main"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  redisdata:
  miniodata:
