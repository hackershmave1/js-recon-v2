name: CI

# REQ-T4: the external-engine contract tests only guard against upstream
# output-schema drift if they actually run somewhere on every change. This
# workflow is that "somewhere". RECON_REQUIRE_ENGINES=1 turns a missing/broken
# engine from a silent skip into a hard failure, so a green build genuinely means
# "the pinned engines still produce the output our parsers expect".

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Fast lane: everything that needs no Postgres/Redis/MinIO. Kingfisher ships as
  # a pip wheel (binary bundled), so its real-binary contract test runs here and
  # catches secret-output drift on every push. Vespasian (tree-sitter) is pure
  # Python and its extraction tests run here too.
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (with dev extras + the Kingfisher wheel)
        run: pip install -e ".[dev]"
      - name: Unit + engine contract tests (no infra)
        env:
          RECON_REQUIRE_ENGINES: "1"
        run: pytest -m "not integration"

  # Full lane: builds the app image (which compiles the pinned Sourcemapper commit
  # with Go) and brings up the data stores, then runs the whole suite inside the
  # image. This is where Sourcemapper's real-binary golden-map contract test and
  # the end-to-end integration tests run.
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image + start stores + migrate
        run: docker compose up -d --build postgres redis minio migrate
      - name: Full suite incl. real-engine contract tests + integration
        run: >
          docker compose run --rm --user root -e RECON_REQUIRE_ENGINES=1
          api sh -c "pip install --quiet pytest fakeredis && pytest -m ''"
      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Tear down
        if: always()
        run: docker compose down -v
